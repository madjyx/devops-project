name: CI Pipeline

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r tempconverter/requirements.txt pytest requests

      - name: Run unit tests
        run: python -m pytest tempconverter/tests/test_unit.py -v

      - name: Build container image
        run: docker build -t tempconverter:latest -f tempconverter/Containerfile tempconverter/
